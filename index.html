<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peminjaman Barang TKJ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stars"></div>

<h1>Peminjaman Barang TKJ</h1>

<!-- LOGIN -->
<div class="login-box">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Masuk</button>
</div>

<!-- FORM PEMINJAMAN -->
<div id="main" style="display:none;">

  <h2>Form Peminjaman Barang</h2>

  <div class="form-container">
      <input id="nama" placeholder="Nama Peminjam">
      <input id="kelas" placeholder="Kelas">
      <input id="barang" placeholder="Nama Barang">
      <input type="date" id="tanggal">
      <input type="file" id="fotoPinjam">
      <button onclick="simpanData()">Simpan</button>
  </div>

  <h2>Pengembalian Barang</h2>

  <div class="form-container">
      <select id="selectPeminjam"></select>
      <input type="date" id="tanggalKembali">
      <input type="file" id="fotoKembali">
      <button onclick="kembalikan()">Kembalikan</button>
  </div>

  <h2 class="table-title">Data Peminjaman</h2>

  <div class="table-box">
      <table id="tabelData">
          <thead>
              <tr>
                  <th>Nama</th>
                  <th>Kelas</th>
                  <th>Barang</th>
                  <th>Tanggal</th>
                  <th>Foto</th>
                  <th>Aksi</th>
              </tr>
          </thead>
          <tbody></tbody>
      </table>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
