<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aset Flow TKJ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box" id="loginBox">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username: roup">
    <input type="password" id="password" placeholder="Password: king">
    <button onclick="login()">Masuk</button>
</div>

<div class="container" id="app" style="display:none;">
    <h1>Aset Flow TKJ</h1>

    <div class="form-box">
        <h3>Form Peminjaman</h3>

        <label>Nama Peminjam</label>
        <input type="text" id="nama">

        <label>Kelas</label>
        <input type="text" id="kelas">

        <label>Barang</label>
        <input type="text" id="barang">

        <label>Tanggal Peminjaman</label>
        <input type="date" id="tanggal">

        <button id="btnSimpan" onclick="simpanData()">Simpan</button>
    </div>

    <div class="table-box">
        <h3>Daftar Peminjaman</h3>
        <div class="tbl-wrapper">
            <table id="tabelData">
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>Kelas</th>
                        <th>Barang</th>
                        <th>Tanggal</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
